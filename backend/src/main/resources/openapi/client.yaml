paths:
  Config:
    get:
      summary: Get the frontend configuration.
      tags:
        - frontend
      operationId: getFrontendConfiguration
      responses:
        200:
          description: Successful response containing the frontend configuration, e.g. Google Maps API Key etc.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FrontendConfigurationResponse"
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'
  ConfigImportFile:
    get:
      summary: The status of the file import process.
      tags:
        - frontend
      operationId: fileImportStatus
      responses:
        200:
          description: Successful response containing the status of the file import process.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileImportStatus'
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'
    post:
      summary: Import data from a file.
      tags:
        - frontend
      operationId: importFromFile
      requestBody:
          description: The file to import along with the import type.
          required: true
          content:
            multipart/form-data:
              schema:
                type: object
                properties:
                  file:
                    type: string
                    format: binary
                  importType:
                    $ref: '#/components/schemas/ImportType'
                  receiver:
                    type: string
                    description: The receiver identifier (e.g. contact name or group name)
      responses:
        204:
          description: The file is successfully being imported.
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'
  ConfigTelegram:
    get:
      summary: Get Telegram connection status.
      tags:
        - frontend
      operationId: getTelegramStatus
      responses:
        200:
          description: Current Telegram connection status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramStatus'
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'
  ConfigTelegramConnect:
    post:
      summary: Start Telegram connection with phone number.
      tags:
        - frontend
      operationId: connectTelegram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramConnectRequest'
      responses:
        204:
          description: Connection started; poll status for code/password steps.
        400:
          $ref: '../thereabout.openapi.yaml#/components/responses/400'
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'
  ConfigTelegramCode:
    post:
      summary: Submit Telegram login code (from SMS/app). Not stored.
      tags:
        - frontend
      operationId: submitTelegramCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramCodeRequest'
      responses:
        204:
          description: Code submitted.
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'
  ConfigTelegramPassword:
    post:
      summary: Submit Telegram 2FA password. Used only for this step; never stored.
      tags:
        - frontend
      operationId: submitTelegramPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramPasswordRequest'
      responses:
        204:
          description: Password submitted.
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'
  ConfigTelegramResync:
    post:
      summary: Trigger a manual resync of Telegram messages (no re-auth).
      tags:
        - frontend
      operationId: resyncTelegram
      responses:
        204:
          description: Resync triggered.
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'
  ConfigTelegramResyncCancel:
    post:
      summary: Cancel the current Telegram resync (backfill) if one is running.
      tags:
        - frontend
      operationId: cancelTelegramResync
      responses:
        204:
          description: Cancel requested; resync will stop after the current batch.
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'
  ConfigTelegramDisconnect:
    delete:
      summary: Disconnect Telegram and stop sync.
      tags:
        - frontend
      operationId: disconnectTelegram
      responses:
        204:
          description: Disconnected.
        500:
          $ref: '../thereabout.openapi.yaml#/components/responses/500'

components:
  schemas:
    FrontendConfigurationResponse:
      type: object
      required:
        - googleMapsApiKey
      properties:
        googleMapsApiKey:
          type: string
          example: TEST_KEY_ASJHKASHDASJDDSA
        thereaboutApiKey:
          type: string
          example: UUID-2342-4556345
        versionDetails:
          $ref: "#/components/schemas/VersionDetails"
    VersionDetails:
        type: object
        required:
            - version
            - commitTime
            - commitRef
            - branch
        properties:
          version:
            type: string
            example: "1.0.0"
          commitTime:
            type: string
            format: date-time
            example: "2024-01-01T00:15:10.145Z"
          commitRef:
            type: string
            example: "4faee41"
          branch:
            type: string
            example: "main"
    FileImportStatus:
      description: The status of the file import process.
      type: object
      required:
        - status
        - progress
      properties:
        status:
          type: string
          example: "IN_PROGRESS"
          enum:
            - IN_PROGRESS
            - IDLE
        progress:
          type: number
          example: 60
          description: The progress of the file import process from 0 to 100.
    ImportType:
      type: string
      description: The type of file being imported.
      enum:
        - GOOGLE_MAPS_RECORDS
        - WHATSAPP_CHAT
        - TELEGRAM_CHAT
        - HEALTH_AUTO_EXPORT_JSON
    TelegramStatus:
      type: object
      required:
        - status
        - configured
      properties:
        status:
          type: string
          enum:
            - DISCONNECTED
            - CONNECTING
            - WAIT_PHONE
            - WAIT_CODE
            - WAIT_PASSWORD
            - READY
            - SYNCING
            - ERROR
        phoneNumber:
          type: string
          description: Masked or last-used phone (optional).
        lastSyncAt:
          type: string
          format: date-time
        configured:
          type: boolean
          description: Whether api_id and api_hash are set.
        resyncStatus:
          type: string
          enum:
            - IDLE
            - IN_PROGRESS
            - COMPLETE
            - CANCELLED
            - ERROR
          description: Status of the manual resync/backfill (optional).
        resyncProgress:
          type: integer
          minimum: 0
          maximum: 100
          description: Resync progress 0-100 when resyncStatus is IN_PROGRESS (optional).
    TelegramConnectRequest:
      type: object
      required:
        - phoneNumber
      properties:
        phoneNumber:
          type: string
    TelegramCodeRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
    TelegramPasswordRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          description: 2FA password; used only for this step and never stored.
